<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este viedo esta hospedado no meu proprio servidor.</p>

    <video width="500" poster="imagens/image-banner.png.png" controls>
       <source src="midia/meu-video.mp4.ogv" type="video/ogg">
       <source src="midia/meu-video.mp4.mp4" type="video/  mp4">
       <source src="midia/Meu-video.m4v.mp4" type="video/m4v">
       <source src="midia/Meu-video.webm.webm" type="">
       <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>
    </video>
       
       <h1>Inserindo video do youtube</h1>
       <iframe width="560" height="315" src="https://www.youtube.com/embed/jPWsBuiy1rE?si=bE9gdWCi63jE612t" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </video>

</body>
</html>
